services:
  - type: web
    name: know-your-data-api
    env: python
    plan: free
    buildCommand: pip install -r erp-dashboard/requirements.txt
    startCommand: cd erp-dashboard && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 10000
