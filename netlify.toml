[build]
  command = "pip install -r requirements.txt && npm install"
  functions = "netlify/functions"
  publish = "erp-dashboard/templates"

[dev]
  command = "python erp-dashboard/app.py"
  port = 5000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
